spring:
  datasource:
    url: jdbc:h2:mem:studymate;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: false
    open-in-view: false

jwt:
  issuer: studymate
  secret: studymate-jwt-secret-key-that-is-long-enough-for-hs256
  access-token-expiration: 1800000
